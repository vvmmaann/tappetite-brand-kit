<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Tappetite — шаблон поста 1:1</title>
<!--
  КАК ПОЛЬЗОВАТЬСЯ:
  1. Открой этот файл в браузере (двойной клик).
  2. Поменяй текст ниже в двух местах, помеченных  <!== МЕНЯЙ ==>.
  3. Сделай скриншот квадрата (или Ctrl/Cmd+P → Сохранить как PDF → обрежь).
     Размер холста уже 1080x1080 — идеально для Instagram 1:1.
-->
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,600;1,6..96,500&family=JetBrains+Mono:wght@500&family=Onest:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#cfc6b4; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .card {
    width:1080px; height:1080px; background:#FAF6F0; position:relative;
    font-family:'Bodoni Moda', Georgia, serif; color:#1A1F36; overflow:hidden;
  }
  .eyebrow {
    position:absolute; top:96px; left:0; width:100%; text-align:center;
    font-family:'JetBrains Mono', monospace; font-size:26px; letter-spacing:0.28em;
    text-transform:uppercase; color:#8A7A6A;
  }
  .opt {
    position:absolute; left:110px; width:860px; height:300px; background:#FFFCF7;
    border-radius:36px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 44px rgba(90,60,30,.10); border:3px solid transparent;
  }
  .optA { top:250px; border-color:#B5532E; }   /* акцент на верхней — «твой выбор» */
  .optB { top:640px; }
  .opt .nm { font-size:96px; font-weight:600; padding:0 40px; text-align:center; }
  .orr {
    position:absolute; top:588px; width:100%; text-align:center;
    font-style:italic; font-size:40px; color:#8A7A6A;
  }
  .foot {
    position:absolute; bottom:70px; left:0; width:100%; text-align:center;
    font-size:34px; letter-spacing:.01em; color:#1A1F36;
  }
  .foot .dot { color:#B5532E; }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Что выберешь</div>          <!-- <!== МЕНЯЙ (подпись-капс) -->

    <div class="opt optA"><div class="nm">Кофе</div></div>   <!-- <!== МЕНЯЙ (вариант A) -->
    <div class="orr">или</div>
    <div class="opt optB"><div class="nm">Чай</div></div>    <!-- <!== МЕНЯЙ (вариант B) -->

    <div class="foot">tappetite <span class="dot">·</span> узнай свой типаж</div>
  </div>
</body>
</html>
